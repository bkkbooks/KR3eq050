body:
  text: 卷一張仲景仲景不詳何時人傷寒論自序世人多疑其偽撰而言仲景後漢建安中之人而宮至長沙太守是以其自序為自序者也傷寒論序曰余宗族素多向餘二百建安紀年以來猶未十稔其死亡者三分有二傷寒十居其七云云范曄後漢書只有張氏為南陽族姓之語果其有張機字仲景南陽人而學同郡張伯祖者經方大有時名則何不與郭玉華佗等同傳靈帝時孫堅守長沙後漢書劉表傳曰初平元年長沙太守孫堅殺荊州刺史王叡詔書以表為荊州剌史又靈帝紀曰中平四年零陵人觀鵠自稱平天將軍寇桂陽長沙太守孫堅擊斬之及袁術有南陽以蘇代領長沙後漢書袁術傳曰術畏董卓之禍出奔南陽會長沙太守孫堅殺南陽太守張咨引兵從術劉表為南陽太守又表孫堅領豫州剌史司馬彪戰略曰術屯魯陽盡有南陽之眾吳人蘇代領長沙太守建安三年長沙太守張羨率零陵桂陽二郡畔劉表後漢書劉表傳三國志桓階傳曰階字伯緒長沙臨湘人也太守孫堅舉階孝廉除尚書郎父喪還鄉里會堅擊劉表戰死階冒難請表乞喪表義而與之後太祖與袁紹相拒官渡表舉州以應紹階說其太守張羨曰夫舉事而不本於義未有不敗者也故齊桓率諸侯以尊周晉文逐叔帶以納王今袁氏反此而劉牧應之取禍之道也明府必欲立功明義全福遠禍不宜與同也羨曰然則何向而可階曰曹公雖弱伏羲而起救朝廷之危奉天命而討有罪孰敢不服今若率四郡保三江以待其來而為之內應不亦可乎羨曰善乃舉長沙及旁郡以拒表遣使請太祖太祖大悅官渡役在獻帝建安五年羨卒子懌嗣為長沙太守劉表並之三國志劉表傳曰長沙太守張羨叛表表圍之連年不下羨病死長沙復立其子懌表遂攻並懌南攻零桂北據漢川地方數千里帶甲十餘萬以韓玄為長沙太守三國志黃忠傳曰忠字漢升南陽人也荊州牧劉表以為中郎將與表從子磐守長沙攸縣及曹公克荊州假行裨將軍仍就故任統屬長沙太守韓玄表卒子琮代立遣使請降曹公平荊州蜀志避劉巴為掾使招納長沙零陵桂陽三國志劉巴傳曰曹公徵荊州先生奔江南荊楚群士從之如雲巴北詣曹公曹公闢為掾使招納長沙桂陽零陵曹公敗於赤壁引軍歸鄴先主表劉表長子琦為荊州刺史又徵四郡長沙太守韓玄降蜀志先主使諸葛亮督零桂長沙三郡三國志諸葛亮傳曰先主遂收江南以亮為軍師中郎將使督零陵桂陽長沙三郡此時建安十三年又擢廖立為長沙太守三國志廖立傳曰先主領荊州牧闢為從事年未三十擢為長沙太守先主入蜀諸葛亮鎮荊土孫權遣使通好於亮因問士人皆誰相經緯者亮答曰龐統廖立楚之良才當贊興世業者也建安二十年權遣呂蒙奄襲江南三郡立脫身走歸先主長沙既非漢家有後終屬於吳蜀志曰建安二十年孫權以先主得益州使使報欲得荊州先主言須得涼州當以荊州相與權忿之乃遣呂蒙襲奪長沙零陵桂陽三郡先主引兵五萬下公安令關羽入益陽是歲曹公定漢中張魯遁走巴西先主聞之與權連和分荊州江夏長沙桂陽東屬南郡零陵武陵西屬由是觀之靈獻之間似無令仲景守長沙之日也諸書所記仲景不一皆出於附托特以皇甫謐所說為古其他不足言焉乃今抄記其說萬姓統譜一統志歷代名書傳略所載無異說故不收錄焉皇甫謐甲乙經序曰漢有華佗仲景其他奇方異治施世者多亦不能盡記其本末若知直祭酒劉季琰病發於畏惡治之而差云後九年季琰病應發發當有感仍本於畏惡病動必死終如其言仲景見侍中王仲宣時年二十餘謂曰君有病四十當眉落眉落半年而死令服五石湯可免仲宣嫌其言忤受湯勿服居三日見仲景謂曰服湯否仲宣曰已服仲景曰色候固非服湯之診君何輕命也仲宣猶不言後二十年果眉落後一百八十七日而死終如其言按王粲傳建安二十一年從徵吳二十二年春道病卒時年四十一此二事雖扁鵲倉公無以加也華佗性惡矜技終以戮死仲景論廣伊尹湯液為數十卷用之多驗近代太醫令王叔和撰次仲景選論甚精指事施用云云皇甫謐釋勸文曰夫才不周用眾所斥也寢疾彌年朝所棄也是以胥克之廢丘明列焉伯牛有疾孔子斯嘆若黃帝創制於九經岐伯剖腹以蠲腸扁鵲造虢而屍起文摯徇命於齊王醫和顯術於秦晉倉公發秘於漢皇華佗存精於獨識仲景垂妙於定方徒恨生不逢乎若人故乞命訴乎明王求絕編於天錄晉書皇甫謐傳王冰素問序曰周有秦公漢有淳于公魏有張公華公皆得斯妙道者也按張公斥仲景李濂醫史曰張機字仲景南陽人也學醫於同郡張伯祖盡得其傳工於治瘡尤精經方遂大有峕譽漢靈帝峕舉孝廉官至長沙太守與同郡何顒客遊洛陽顒探知其學謂人曰仲景之術精於伯祖起病之驗雖鬼神莫能知之真一世之神醫也嘗見侍中王仲宣曰君年至四十當有疾鬚眉脫落脫落後半年必死宜豫服五石湯庶幾可免仲宣時二十餘聞其言惡之雖受方而不飲數日後見仲景乃佯曰五石湯已飲之矣仲景曰觀君氣色非飲藥之診何輕命欺人如此耶仲宣益深惡之後二十年果有疾鬚眉皆脫落越一百八十七日卒時人以為扁鵲倉公無以加之也張果醫說曰提點鑄錢朝奉郎黃沔久病渴極疲瘁予每見必勸服八味丸初不甚後累醫不痊謾服數量遂安或問渴而以八味治之何也對曰漢武帝湯張仲景為此方蓋渴病多是腎之真水不足致然若其勢未至於消但進此劑殊佳且藥性溫平無毒也泊宅編又曰後漢張機字仲景南陽人也受術於同郡張伯祖善於治療尤精經方舉以孝廉官至長沙太守後在京師為名醫於當時為上手時人以為扁鵲倉公無以加之也注曰出何顒別傳甲乙經仲景方論序三國志演義張松難楊修條曰問曰蜀中人物何如松曰文有相如之賦武有管樂之才醫有仲景之能卜有君平之隱九流三教出乎其類拔乎其萃者不可勝紀豈能盡數也方有執傷寒條辨曰張松北見曹操以其川中有仲景為誇虞汝明吳郡人古琴疏出說郛曰張機字仲景南陽人受業於張伯祖精於治療一日入桐柏覓藥草遇一病人求診仲景曰子之腕有獸脈何也其人以實具對乃譯山穴中老猿也仲景出囊中丸藥畀之一服輒愈明日其人肩一巨木至曰此萬年桐也聊以相報仲景劉為二琴一曰古猿一曰萬年徐衟神仙通鑑曰元嘉辛卯冬桓帝感寒疾發熱不止太醫調治無效廣徵良醫傳驛赴京有舉長沙太守張機深達軒岐剋期召入病經十七日機診視曰正傷寒擬投一劑品味輒乃兩計密覆得汗如雨及旦身涼留機為侍中初得陽勵公之傳見朝政日非嘆曰君疾可愈國病難醫遂掛冠遁去隱少室山著金匱玉函諸書陽勵公復來引去神仙通鑑更始立秀為肅王洪武進擊銅馬賊於鉅鹿群盜悉降余賊散入烏桓界賈復與五挍賊戰深入被槍腸撤於外歸營悶絕適草澤醫來納腸入腹以油桑線縫之出一丹灌之遂蘇贈以金帛醫曰吾陽勵公也憐賈君忠勇故救之飄然而去淵鑑類函曰漢書云張機字仲景南陽之人也受業於同郡張伯宜善於治療尤精經方所著有傷寒三十二篇為後世方脈之祖按漢書誤引神應侯神應侯扁鵲諡也人多不知只針灸書有神應經此書題名蓋根蒂於此通鑑曰宋仁宗寶元二年以文宣公孔聖祐從弟宗願襲封文宣公先是聖祐卒無子除襲封且十年有醫許希針愈帝疾拜賜已又西向拜扁鵲曰不敢忘先師也帝為封鵲扁為神應侯立祠城西彭城人顏太初作許希詩指聖祐以諷在位又致書參政蔡齊為言於帝遂以宗願襲封張果醫說引皇朝類苑而事有同異厥厥是病名有所結滯壅塞卒然暴發之病皆以厥字目之扁鵲所謂五藏蹷中之峕暴作也即是也晏子春秋曰厥陽金匱要略曰經云厥陽獨行今內經無此語後世醫家以為冷寒無陽之義者非也陳徹雪潭居醫約論厥者頗為得雪潭居醫約曰夫厥證之起於手足者厥發之始也甚至猝倒暴厥忽不知人輕則漸蘇重則即死是為急候後世不能詳察但以手足寒熱為厥又有以腳氣為厥者謬之甚也雖仲景寒厥熱厥之分亦以手足為言蓋彼以辨傷寒之寒熱耳非若內經之所謂厥也觀大奇論曰暴厥者忽不知人不能言調經論曰血之與氣並走於上則為大厥厥則暴死氣復反則生不反則死繆刺論曰手足少陰太陰足陽明五絡俱竭令人身脈皆重而形無所知其狀若屍或曰屍厥若此者豈止於手足寒熱及腳氣之謂耶今人多不知厥證而皆指為中風寧不誤人乎夫中風者病多經絡之憂傷厥逆者其內精氣之自奪故表裡虛實病情當辨名義不正無怪其以風治厥也醫中之害莫此為甚古言四支厥冷者陰陽氣不相順接手足暴冷也後世終以為手足冷者總稱屬不知厥義厥論曰陽氣衰於下則為寒厥陰氣衰於下則為熱厥靈樞曰刺熱厥者留針反為寒刺寒厥者留針反為熱又中藏經論天地陰陽厥此書雖偽撰然論厥者為優於後人之說中藏經說天地之陽厥則云驟風暴雨雲物飛颺論天地之陰厥則云飛霜走雹朝昏暮靄論人身陽厥暴壅塞忽喘促四支不收論人身陰厥暴啞卒寒一身拘急按厥蹷瘚通用又作蹶而儒書用蹷醫書用厥左傳曰衛石共子卒悼子不哀孔成子曰是謂蹷其本杜預曰蹷猶拔也荀子曰田野荒而倉廩實百姓虛而府庫滿夫是之謂國蹷楊倞曰傾倒也列子曰枳食其皮汁已憤蹷之病張湛曰蹷者氣疾也呂氏春秋曰處足則為痿為蹷注曰蹷逆疾也又曰出則以輿入則以輦務以自佚命之曰招蹷之機枚乘七發原於此語而作蹶痿之機史記扁鵲傳曰暴蹷正義曰釋名云蹷氣從下蹷起上行外及心脅也又曰屍蹷以上注家不說壅滯結塞之義後漢趙壹書曰秦越人還虢太子結脈著其神傷寒論曰藏厥又曰藏結是結厥音通夫病以厥名者倉公傳有熱蹷風蹷蹷上之稱其他如卒厥死厥痙厥脈厥陽厥氣厥痰厥血厥酒厥食厥狂厥肝厥厥頭痛等不可每舉皆屬結義然不言結曰厥者厥字含畜有所結滯壅結而卒然暴作之意也不言脈絕而言脈厥不言冷逆而言陽厥為物壅閉脈氣不來手足脈絕者曰脈厥為物隔絕陽氣屈伏不敷於外一身冰冷者曰陽厥此二證多在傷寒內實癥瘕奔豚卒發之人若夫通暢其壅結則俄頃復故所謂憤蹷暴蹷招蹷痿蹷屍蹷為蹷之蹷亦此義也左傳蹷其本之蹷固同義蓋臨父喪不哀於孝道既見生蹷之機言他日必發動不能有其宗之意也白酒仲景方枳實薤白白酒湯人多用清酒其言曰白猶白湯之白又曰梁武帝詩金盞盛白酒因知是美酒也按白湯與藥湯對猶白徒白民之白也靈樞云以白酒和桂而飲美酒可見白酒與美酒異學之藥性辨曰米酒始熟未灑而酌取上澄者名為白酒俗呼乃革古米是也蓋臆說也造白酒法諸書不一揚州府志曰白酒各州縣皆有用草曲三日可成味極美食物本草曰白酒處處有之以蓼與曲釀米為酒母以水隨下隨飲初下時味嫩而甘隔宿味老而酢矣武帝所詠白酒蓋此類王遜藥性纂要曰杭州白酒乃石灰湯也飲之不特肚脹而舌燥口苦最為害人由是觀之白酒多種皆非入藥用之品也禮內則曰酒有清白鄭玄曰昔酒今之酋久白酒所謂舊醳廣韻曰苦酒周禮天官酒正辨三酒之物一曰事酒二曰昔酒三曰清酒注曰事酒有事而飲也昔酒無事而飲也清酒祭祀之酒本草綱目曰飲膳標題云白者曰醝玉篇曰白酒也周禮天官酒正酇曰釋文曰即今白醝酒也白酒千金方作白酨漿即酢也外臺方作白酨酒程衍道注曰酨音再酢漿也又按字典音代說文酢漿也玉篇釋米汁也周禮天官酒正漿注酨漿酨之言載也米汁相載也乃今用酢為得飲膳正要曰米酢為上入藥用甘草粉蜜湯諸注家釋粉曰即粉錫也一名白粉一名鉛粉又名胡粉此乃用鉛化造者其法詳於李氏綱目今以藥鋪呼篤烏那慈地者為真勿用婦人傅面稱和失魯肥者以有夾雜也本草逢言曰甘草粉蜜湯治蛔病吐涎心痛專取胡粉殺蟲甘草安胃蜜以誘入蟲口也又傷寒直解及論注皆以為鉛粉以故近世古方家先生皆用胡粉而不疑按千金方並外臺方作粱米粉蓋本論粉上脫粱米二字也千金外臺以不題其方名人徒看過傳謬而已廣東人參世有稱廣東人參者往年官禁不許市賣蓋以其非參類也近禁漸開得貨之人多貴重之以為勝韓種人參議者或疑以為沙參或以為零餘子人參紛紛無明徵而用之者亦雖知其非參類而以其味大似人參用之而不疑頃問之長崎人曰或嘗以朝鮮廣東韓種竹節四種人參示之和蘭瘍醫皆不識之只指廣東人參曰亞墨利加寬政丙辰和蘭將來廣東人參若干斤又題曰亞墨利加仍識此物產亞墨利加嘗記廣東人呂大圭者來崎陽上書言其地不產人參閱大明一統志廣東者古百粵之地而其產無人參廣東新語曰越無人參蘇長公嘗種羅浮有詩云上黨天下脊遼東真井底靈苗此孕育肩股或具體移根到羅浮越永灌清泚地殊風雨隔真味終祖禰由是視之廣東不生人參者可知也頃閱徐應登所序醫便載金不換三七試驗曰出自粵西惟右江南等州蠻夷地名為最粵西是廣東則所謂廣東人參即金不換三七也此物從來奇藥故世用廣東人參者偶中守株而已本草綱目所說三七之解不一時珍曰近傳一種草者即今所謂三七也與金不換不同如其主治綱目所載瀕湖集簡方醫便皆同又孫光裕血症全集載之共無補氣之說但是系血藥用廣東人參者知之而臨病者則其誤鮮矣集簡方載在本草綱目今只記醫便血症全集醫便曰金不換三七經驗仙方三七出自粵西惟右江南等州蠻夷地名為最產於險峻山谷之間真味似人參每莖上七葉下三根故名三七重擬良金又名金不換又名血見愁專治血歸經絡效最莫比今將治法開真於後一治金刃箭傷跌跋傷損血出不止自嚼少許罨患處即愈一治婦人赤白帶下每服用一錢研末溫酒送下一治吐血用一錢自嚼茅花煎湯或米湯送下一治男婦傷寒口齒不開將生薑擦齒用薑湯調三錢服一治婦人產後敗血作疼用一錢或五分艾葉煎湯老酒研末送下自嚼亦可一治男婦被打傷青腫不消用一錢嚼細塗患即消一治男婦害眼十分沉重不開用一錢嚼爛塗眼外一宵即愈醫鑑云水磨塗眼眶一治男婦紅白痢疾用一錢研末木香黃連煎湯或米泔水送下一治蛇傷虎傷用一錢磨細酒送下余嚼塗患立效一治男人下蠱毒先嚼一錢遇毒即返神效一治男婦喉瘋單雙鵝頭用一錢為末鹽酒送下一治男婦心氣疼痛量年久近有二錢或一錢為末溫酒調下或自嚼酒送下亦可一治小兒痘疹用一錢蜜水滾熱服下一治男婦血淋用一錢燈草薑湯送下一治婦人血山崩量年遠近研末一錢用淡白酒或米湯服一二次即愈一治腸紅下血用四物湯加三七五分服最效或用槐角煎湯或空心用溫酒服一治杖傷或刃破淤血取三七隨傷大小咀嚼罨之即愈行杖時先服一錢亦可使血不衝心杖後尤宜屢服之一治男婦生無名腫毒或癰疽等瘡疼痛不止一二錢研細塗上痛即止或初成或未成以好米醋磨塗即散血症全集曰三七即金不換止吐衄血下血血崩氣味甘微苦溫主治止血散血血運血痛乃陽明厥陰血分之藥故能一切血病吐血衄血山漆一錢自嚼米湯送下或用五分加入八物湯下血血崩研末同白酒調服一二錢或入四物湯服血痢米泔水調服風東涯先生曰中風之病未詳其名義以為中於風則寒疾之症也所謂中風者非寒疾近代醫書雖有其說亦未的確蓋風非風雨之風也為氣而解之其義稍通心氣疾氣血疾充滿軀內而運動流行者皆可以稱風所謂大塊噫氣其名曰風風者天地之氣也故釋之以氣癩瘡稱大風其為氣義可以見也又有腸風胃風又有白癜風紫癜風此等疾有風名者皆氣血錯亂所致也又小兒有急慢驚風又狂病曰心風曰風疾唐書曰風疾使酒不可入仕是狂亂醉狂不任官也狂人稱風癲漢又稱風子又單用風字以為心疾是皆指心氣錯亂也中風之病一身氣血偏枯軟瘓作種種形狀是為風所中也西土又有相墓術謂之風水又名地理宋儒之言曰有水以界之無風以散之出於有身集要是豈地中有風乎又言其氣而已佛書地水火風謂之四大四大假合為幻體四大各歸其源暖氣歸於火轉動歸於風出於圓覺經夫風在人身所轉動也是亦指氣也又犬之狂曰風狗曰顛狗可見風者氣也而醫書指心氣氣血之變曰中佛典是梵言至其翻譯皆是唐人以當時之語而譯之可以證也余按醫籍以風名病者甚多然其實不過三義也而名中風者有二症傷寒論曰中風是言傷寒輕症即風寒之風於字義為至當中為去聲即傷風也頭風破傷風風濕等皆風寒之風屬外因是為一義世之所謂中風者其證半身不遂口眼歪斜東涯以氣字為解者也莊子曰民濕寢則腰疾偏死荀子曰禹跳湯偏尹子曰禹之勞十年不窺其家手不生爪脛不生毛偏枯之病步不相過人曰禹步鄭注尚書大傳曰湯半身體枯淮南子曰偏枯之藥是即世之所謂中風而古典不言中風夫中風者傷風之名而系外襲風邪而偏枯者原有症痼疝癖血塊瘀毒而思慮過度或酒色昏荒之人因寒暑飢飽內勢激發也至其輕重緩急順逆虛實其候多端也素靈無中風之目風論有中風字者謂中於風而說風之症者往往有之素問云風之傷人也或為寒熱或為熱中或為寒中或為癘風或為偏枯或為風靈樞云虛邪偏客於身半其入深內居營衛營衛稍衰則真氣去邪氣獨留發為偏枯此類不可枚舉金匱要略說中風者有與傷寒論不吻合者金匱是蠹余殘簡後人所輯錄不足為徵焉然後漢既以偏枯為中風或單稱風疾表忠傳曰風疾瘖不能言又三國志注曹瞞傳曰太祖少好飛鷹走狗遊蕩無度其叔父數言之於嵩太祖患之後逢叔父於路乃陽敗面喎口叔父問其故太祖曰卒中惡風叔父以告嵩嵩驚愕呼太祖太祖口貌如故嵩問曰叔父言汝中風已差乎太祖曰初不中風但失愛於叔父故見罔耳嵩乃疑焉自後叔父所告蒿終不復信太祖於是益得肆意此稱中風者父母病之其子多病之屬內因所謂大麻風癩風大風等諸名皆為一義也至如風狂風癲風狗風魔則又別為一義通鑑曰國子祭酒祝欽明自請作八風舞搖頭轉目備諸醜態上笑祝欽明素以儒學著名吏部侍郎盧藏用私謂諸學士曰祝公五經掃地盡矣胡三省曰所謂八風舞非春秋魯大夫眾仲所謂舞者所以節八音行八風者也借八風之名而備諸淫醜之態耳令人謂淫放不返為風此則欽明所謂八風也是與風狂風癲之風同義也怪產夏修己背折而生禹殷簡狄胸剖而生契嘗以為不可信城北多賀郡折橋村一農婦經閉腹滿諸醫認為鼓脹後數月臍上發疽既潰膿汁雜出毛髮人以為異日後潰口出一足眾皆驚愕瘍醫斷之從是日出顱蓋脊肋諸骨及胞腸始知其妊調理數月得愈古史所記不可誣也治之者門人莊司以文之父友智實寬政戊午七月之事也吮癰史記吳起傳曰卒有病疽者起為吮之卒母聞而哭之人曰子卒也而將軍自吮其疽何哭為母曰非然往年吳公吮其父其父戰不旋踵遂死於敵吳公今又吮其子妾不知其死所矣是以哭之前漢書鄧通傳曰上嘗病癰通為上嗽吮之上問曰天下誰最愛我者通曰宜莫若太子及太子入問疾上使齰癰太子色難之已而聞通嘗為上齰之太子慚克嘗以為吮疽齰癰者良將與士卒分勞苦者佞臣淫蠱媚主者不問驗與不驗必在得其心而有此事也水戶城西飯富村有一農夫貧且魯加之累年不登於是計營益窮因舉田宅賣之身為瘍醫家奴因識一二煉膏乃辭還里自稱得治癰疽之妙舊知奴生平者竊嗤笑焉無乞療者奴又餓鄰里偶有患疽者其家貧無迎醫之資因招奴奴欣然應招貼膏然斷斷兮無他技唯自吮其疽而已其疽不日而愈又有一財翁患癰者名家國手不能治之初患疽者屢譽奴之效翁亦以經數醫之手而不治終令奴療之又唯嗽吮如初而新肉大起無幾報疴於是鄰里鄉黨刮舌改觀來迎接踵余嘗見其奴實一癡漢只可令吮之而已奴曰膿味不同有經久而味不惡者又有臭惡不堪者吮之數日則其惡味漸復已復則生肉活血可指期而治焉其瘡瘍吉凶安危皆以三寸舌卜之百不失一焉蓋古吮疽齰癰不啻示慈愛結人心佞諂承順媚人主以其有良驗奇效有此事也吹霎癸辛雜識曰吹霎二字每見劉長卿用之傷寒感冷意問之則謾言出漢書然莫可考也繼閱方書於香芎散證治云吹霎傷風頭痛發熱此必有所據今考香芎散香芎丸及湯未見吹霎字其方出風病門按吹霎猶言風雨吹是北吹朔吹之吹霎字書曰雨聲也蓋言吹與聲者說風雨氣為濕淫之形容歟曼陀羅花曼陀羅花本草綱目曰相傳此花笑採釀酒飲令人舞予常試之飲須半酣更令一人或笑或舞引之乃驗也今試之不問莖葉花實末之酒服五六分周身麻木不知痛癢又煎一錢許服之亦可麻力稍劣又與火麻子花莖枯者益良陰乾等分熱酒調服三錢昏昏如癡手足不仁或甘睡不醒或神心不守如風狂三二日復故然其性人人異又有如死者或云用之一老人不醒終死宜斟酌作劑凡割肉刮骨不可無此藥也又以末塗之皮膚頑麻然不徹肉與塗烏頭者同效近聞西京中神以鄰用之諸病其效多端余未及識其人又本草載茉莉根以酒磨一寸服則昏迷一日乃醒二寸二日三寸三日凡跌損骨節脫臼接骨者用此則不知痛余未試河間紀氏所著姑妄聽之曰閩人有女未嫁卒已葬矣閱歲余有親串見之別縣初疑貌相似然聲音體態無相似至此者出其不意從後試呼其小名女忽回顧知不謬又疑為鬼歸告父母開塚驗視果空棺共往蹤跡初陽不相識父母舉其胸脅瘢痣呼鄰婦視乃其伏覓其夫已遁矣蓋閩中茉莉花根以酒磨汁飲之一寸可屍蹷一日服至六寸尚可蘇至七寸乃真死女已有婿而私與鄰子狎故磨此根使詐死待其葬而發墓共逃也婿家鳴官捕得鄰子供詞與女同時吳林塘官閩縣親鞫是獄欲引開棺見屍律則人實未死事異圖財欲引藥迷子女例則女本同情謀殊掠賣無正條可以擬罪乃仍以奸拐本律斷人情變幻亦何所不有乎黴瘡秘錄海寧陳司成黴瘡秘錄以崇禎壬申就後閱宋竇漢卿瘡瘍全書全部十三卷康熙中洪瞻岩陳友恭所校其中載黴瘡秘錄而又有小異同稽之全編漢卿裔孫夢鱗增補而行世者也其序有隆慶三年之記因疑隆慶崇禎相去六十年陳司成何物取竇氏成說自為己說後又得瘡瘍全書一部十二卷無黴瘡秘錄文曰宋燕山竇漢卿輯著明三衢大酉堂繡梓因識日所閱瘡瘍全書加陳司成黴瘡秘錄而射利當時即康熙中洪陳二人之所為也讀者宜知之牛黃清心丸癸辛雜識曰和劑惠民藥局當時製藥有官監造有宮監門又有官藥藥成分之內外凡七十局出售則又各有監官皆以選人經任者為之謂之京局官皆異時朝士之儲悉屬之大府寺其藥價比之時直損三之一每歲糜戶部緡錢十萬朝廷舉以償之祖宗初制可謂仁矣然弊出百端往往為諸史藥盜竊至以樟腦易片腦臺附易川附橐橐為奸朝廷莫之知亦不能革也凡一劑成則又皆為朝士及有力者所得所謂惠民者元未得分毫及民也獨暑藥臘藥分賜大臣及邊帥者雖隸御藥其實劑局為之稍精緻若至寶丹紫雪膏之類固非人間所可辨也若夫和劑局方乃當時精集諸家名方凡經幾名醫之手至提領以從官內臣參校可謂精矣然其間差訛者亦不少且以牛黃清心丸一方言之凡用藥二十九味其間藥味寒熱訛雜殊不可曉嘗見一醫云此方止是前八味至蒲黃而止自乾山藥以後凡二十一味乃補虛門中山芋丸當時不知緣何誤寫在此方後因循不曾改正余因其說而改之信然凡此類必多有之信乎誤注本草非細故也克校之今本藥味序次多失誤又不載山芋丸方諸虛門中只有大山蕷丸大抵相適據山蕷丸方除其藥味則余牛黃麝香羚羊角龍腦黃芩雄黃犀角蒲黃八味是即牛黃清心丸而外更餘地黃一味然未知此說何所據也黎居士易簡方等所載清心丸與局方所載同傷寒甚哉醫之難學夫醫雖末技原為政之一端凡有情之物不能無疾病故投醫藥而救夭札之患矣神農氏嘗百草而醫藥興焉然而正史不載其所謂本經後人偽託之書比之素問難經則又覺稍下一等何以素難為醫家古典而爭衡於六經乎而二書惟說針灸如其方藥則措而不舉醫果興於神農則素難何不載其言夫以湯液為不足用而不及針灸之效耶蓋素問之書非一時一人之作合數篇而為一部者據文辭而可見也或云出於戰國或曰就於漢時又云與淮南子同作至五運六氣之說則唐王冰之所偽作而古醫籍所未嘗有也夫醫之用備人身之變者而其道賤小也後學者欲廣大其道仍轉說其常則不能不言神仙卻老延齡之術終離先王之道別說至人真人爾後千載論醫者祖述之滔滔者天下皆是難經蓋就於一人之手其論不全知素問者之所著也蓋作者固不假名於扁鵲而後人尊信之遂冒之以扁鵲然而二書之出去古未遠古言之可徵者往往散在各篇是不可悉信而不可悉廢焉要之醫之興未可知創何時也然與謂之未可知創何時也不如謂之興於神農也後漢張仲景傷寒論始載方藥或云輯古方而作或云仲景造之後漢書無列傳其考既詳於前今以仲景為仲景惟此一書可謂古典也諸論有晉王叔和插入素難語大失其真之說今所傳傷寒論去叔和之世既遠矣亦非叔和所撰次之舊嗚呼醫為政之一端而不齒於藝苑人士舍而不校古書亦多不傳幸有傷寒論亦只殘簡不全而加之有後人攙入醫之難學余每長太息於此仲景之書固是與諸醫籍不同古來注者不知而說之以其不同而欲同其不同方枘圓鑿終至言古方不宜今人中世以來淫理論五運相剋司天在泉之說習熱久為性徵之仲景而不通則以其所信說攙入其書中亦不得已也吾邦之民不見干戈者二百年於此承平之久右文之化以及吾醫良山先生一唱古醫方人始知讀傷寒論自是海內知古方宜今人折衷於仲景說傷寒者何徒數十家比之西土則其勝遠矣只其說古方者明吳又可最有所見然其著溫疫論開卷說邪在募原達原飲主之者是徒欲建奇幟於千古者而不足怪其僻建言家之常態也至如言白虎達表氣之劑逐邪不可拘結糞及其他所言踏實地溯源流實識古方者也若言溫度與傷寒不同則亦是素難家之醫而已舊習既為性不足深責也傷寒論與素難之言不同其題名傷寒者以群籍正傷寒之說而解之則難通原與冬寒之寒不相關又曰中風者與群籍同看則半身不仁口眼喎斜於仲景則不然論既見於風字條吳又可又言傷寒少而溫疫多矣實傷寒少而溫疫多則仲景何置其多而論其少乎或言傷寒者雅士之言溫疫者田舍間之稱夫或然或不然余嘗有答桃井桃庵書頗辨此事並附於此曰本月十六日得老兄之書不題日月不知其幾日發承仲景論中中風傷寒真溫疫三證之事謹領其詳不佞始以為老兄之於醫以復古為業且刻日之事仲景所未嘗論而老兄之新得更得其詳則有益於斯醫矣仍問其詳耳老兄蓋以建一家之言為務古人之說或有不合老兄之論者則皆以為不至實境豈欲令天下人心悉同老兄乎何其所見之狹乎不佞素不好爭故不欲言老兄建言之非只問刻日之事而已其刻日者仲景所未嘗言故言無取徵之地又論不佞之所言中風傷寒皆是單病而真溫疫別是一證亦是仲景所未嘗言而老兄之私說也老兄又曰溫者溫熱也南天之餘氣即所謂瘴癘是也瘴者彰也南天彰明之淫氣高山亦彰明故有山嵐瘴氣亦是仲景所未嘗言也風土氣候不與傷寒相涉讀仲景書漫引他醫籍則徒費解夫風土之說嶺南衛生方等有論說老兄何執滯斯空論乎願高其論老兄又曰疫者行疫有鬼而流行也故謂之疫古人所名不亦正乎亦是仲景所未嘗言而以疫為有鬼者彼我一般漢有剛卯帶之之制後漢有振子逐疫之式本邦打鬼豆擊鬼木之類是也聖人不語怪力亂神假令有鬼行之於理療之日一切無用又與命名之義不相協老兄何以言之正乎未知老兄刻日之法有殺鬼技否凡疫鬼為祟之類觀聊齋志異等則其怪非老兄所言之比老兄又曰叔和一失古訓而素難偽學興焉素難雖晚出而叔和以前之書何其言謬老兄又以皇甫謐序文中原於伊尹湯液之語為徵唯夫甲乙經既後於叔和而伊尹湯液之事正史不記何足以為徵焉此他老兄所言不遑枚舉辨之願老兄讀天下書而臨醫事則復古之學可與言不佞竊為老兄惜之是等之事一面晤則竹破冰釋東西三百里無緣相見為可憾焉今為老兄陳鄙見請老兄少留意夫傷寒中風者輕重之稱呼共失其理則傳至陰證又有合病並病亦有輕重之分也故周編論之太陽篇中溫病一句後人之所加何則論中不再言是全系以他醫籍並論傷寒溫病所補入也夫仲景之所論傷寒者正史所記疫是也疫者取淫疫之義云說文曰民皆疾也是與他醫方書曰正傷寒者不同四時之通名也蓋後漢時或偶呼疫為傷寒崔實政論亦有傷寒語其他經史未見有之小品方曰傷寒是雅士辭天行溫疫是田舍間號此說雖謬然不以傷寒溫疫為二證者稍可取也老兄所謂真溫病仲景未嘗言又其溫疫豈有真候二證乎老兄若留意於此則不佞之所試猶可論若夫橫義臆斷互以為是則不佞所不屑不欲與老兄爭也照亮不盡副治驗二首畢覽完璧所諭國字書大氐答本書中故不別陳不佞偏頭痛刺尺中去惡血後覺了了勿勞念不佞所申尺中非老兄所謂指腹為尺中者統希省察五毒五藥古語往往指藥言毒藥皆是比諭之言也古方家先生常以為談資凡藥之為物對疾而為用其不冠毒字亦非常用物仰藥而死之類可以見也周禮所說毒藥原是二物東門隨筆既辨之然無明證敵異說藤田子定辨之而示余其說鑿鑿有據明瞭乃今錄諸左曰周禮醫師掌醫之政令聚毒藥以共醫事鄭玄注云毒藥藥之辛苦者藥之物恆多毒孟子曰若藥不暝眩厥疾不瘳按此孟子引書之文而鄭玄不直引書者今所謂古文尚書晉時始行鄭玄尚未之睹故也近世大儒物茂卿引此以解論語季康子饋藥夫子不嘗之章而醫人好奇者狃聞其說遂創為古方家者流謂疾醫之業非專用毒藥不可妄庸之徒一意攻擊其病雖除其人亦隨而斃故時人有古方善殺人之諺不意二王王莽王安石之後周禮再流毒於世也以余觀之此不善讀周禮之過也夫醫師眾醫食醫疾醫瘍醫獸醫之長上士二人下士四人府二人史二人徒二十人猶後世尚藥局也其職固云凡邦之有疾病者疕瘍者造焉則使醫分而治之則上文所謂聚毒藥者乃以供疾醫瘍醫等之事也藥則疾醫職所謂五藥注云五藥草木蟲石谷也毒則瘍醫職所謂五毒注云五毒五藥之有毒者總而曰毒藥其不言五者從省文也康成以為藥之辛苦者雖與良藥苦口之談相類古書良藥苦口或有作毒藥苦口者然下文明言五藥五毒則不可從也以毒藥為五毒五藥不獨余臆說昔人亦有此解頃閱清人姜兆錫周禮輯義其解既已如此更考明柯尚遷周禮全經云毒謂五毒攻之之毒藥謂五藥療之之藥二物也聚之所以共眾醫之用其說最為明瞭余請更詳其說假如典婦功之職為主婦人絲枲功官之長而典絲職曰及獻功則受良功而藏之鄭司農云良功絲功縑帛典枲職曰及獻功受苦功鄭司農云苦功謂麻功布紵典婦功統之則曰凡授嬪婦功及秋獻功辨其苦良鄭司農讀苦為鹽謂分別其縑帛與布紵之粗細苦良即典絲之良功典枲之苦功猶省五毒五藥而言毒藥也疾醫職曰以五味五穀五藥養其病以五氣五聲五色眡其死生兩之以九竅之變參之以九藏之動凡民之有疾病者分而治之死終則各書其所以而入醫師瘍醫職曰凡療瘍以五毒攻之以五氣養之以五藥療之以五味節之凡藥以酸養骨以辛養筋以咸養脈以苦養氣以甘養肉以滑養竅凡有瘍者受其藥焉醫師之職統之則曰聚毒藥以共醫事例以苦良之為良功苦功斯可以證其為五藥五毒矣蓋古人命名各有其義均之草木蟲石谷自其可以攻之而言則為毒自其可以療養而言則為藥故瘍醫職掌腫瘍潰瘍金瘍折瘍之祝藥劀殺之齊則備有五毒五藥而疾醫職掌萬民之疾病則言五味五穀五藥而不言五毒可以見已今之古方醫動以周禮疾醫為口實不知本職實無五毒之文可發一笑也上余偶讀周禮因考究及此嘆世無精細讀書之人然余不學醫未知其說於醫事當否如何也聊錄呈南陽原先生乞其是正
