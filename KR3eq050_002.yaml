body:
  text: 卷二伊吹艾草伊吹艾草自古以為上品後藤省艾灸通說載江州豬吹山下太平寺村一老人齎真艾來京師將先君子言為徵焉且精造法開街店也先君子大嘉賞以其事口占焉家圍才栽數根培養甚易茂盛又手掘採嫩根移種缸中乃贈之諸州門弟子令知其真僞有別也余按在昔和歌所詠伊吹山在下野而非近江膽吹山也契沖百人一首改觀抄曰顯昭云據能因坤元儀伊吹山在下野國其跨濃江二州者亦稱伊吹然非是也又按能因歌枕亦作下野州六帖下野艾歌及清少納言枕草子送人之下野州歌亦可以證蓋京畿好事者以其地去京不遠伊吹之名偶同誤認稱揚之近世歌人皆以近江膽吹山入詠下野河內郡都賀郡共有標茅原都賀郡二荒山西北有太郎嶽連其嶽者曰伊吹山其山麓乃標茅原也又作標原又稱戰場原又稱赤沼土人相傳昔在宇中將居於二荒山今稱上城者其墟也時賊起侵疆戰二荒山西北戰場原也連年不息中將之軍動失利陸奧小野人猿丸勇悍好獵中將使人逆之猿丸應招來於二荒山未熟其地理故結茅標之戰遂有功名其地曰標茅原後祀中將於二荒山為二荒神祀猿丸於太郎嶽為慈眼太郎明神神護景雲中勝道上人開二荒山建大已貴田心姬味耜高彥根三祠以中將猿丸袝之又宇都宮橘利遠崇敬太郎明神建祠於府中其地號伊野標茅原蓋建祠時擬太郎嶽地名也其地今有小野氏者蓋猿丸之裔也云生艾草其苗柔軟甘美堪食云神名帳注曰宇津宮神社在河內郡宇都宮城之艮標原祀事代主命二荒山本宮所祀神亦同之古今集載多太多乃女志免士加波良農佐志毛玖佐和禮我古乃世乃阿羅武嘉岐利波風土記曰俗謂之示現太郎宮相傳事代主神舊在二荒山太郎嶽而見神於此所故得斯稱也上注所記慈眼太郎蓋示現太郎之訛也據以上諸說伊吹山標茅原在下野地方者可知也余往年西上經濃江諸地膽吹山下街店市艾往來商旅齎之以貨四方後藤不深考之誤遂至不可改焉通說又曰其灸之為用也孤行雖微內治有力非火氣溫之暗通艾氣之妙至矣盡矣余謂專謂火氣溫之則溫石尉法亦何別焉灸之治法不啻艾功火功最存焉溫石也尉蒸也隔物徹氣如艾灸則點火安駐肌肉上固與溫石尉蒸異矣凡百之物皆以新近不脫其氣為良如六陳暫置焉特艾草貴陳舊經年者蓋取火勢溫溫如冬日也新近其勢猛烈如夏日不可於人身於是乎畜收經年乃聽用孟子所謂猶七年之病求三年之艾也朱子曰干久益善即是也凡艾灸採野艾如法制造經久者為良余按膽吹艾別是一物即九牛草也或云蔞蒿未知何是不徒地名誤其艾亦誤也陳嘉謨本草蒙筌云九牛草産均州山葉圓長背白有芒莖獨植高二尺許氣香似艾採亦端陽謨按艾葉本經及諸注釋悉云生於田野類蒿復道者為佳未嘗以州土拘也世俗反指此為野艾至賤視之端午節臨僅採懸戶闢疫而已其治病症遍求蘄州所産獨莖圓葉背白有芒者稱為艾之精英倘有收藏不吝價買彼處仕宦亦每採此兩京送人重紙包封以示珍貴名益傳遠四方盡開今以形狀考之九牛草者即此人多不識並以艾呼經注明云氣雖艾香實非艾種醫用作炷以灸風濕痹疼癆熱積聚嘗獲效者亦因辛竄可以通利關竅而已謂之全勝真艾未必能然大抵人之常情貴遠賤近泥於習俗膠固不移縱有本經之文諸家之注何嘗著一目視以為真僞之別耶噫可勝嘆哉按西土亦以九牛草為藥艾者彼我一轍何其相似如斯乎生生乳生生乳出黴瘡祕録神效靈驗非他藥之所及而此藥不知其所從來焦氏筆乘曰宋朝類苑載楊嵎瘍生於頰連齒輔車外腫若覆甌膿血內潰痛楚甚療之百方不差或語之曰天官瘍醫中有名方何不試用嵎按瘍醫注疏中法制之用藥注瘡中少損朽骨連牙潰去遂愈按周禮瘍醫掌腫瘍潰瘍金瘍折瘍之祝藥劀殺之齊凡療瘍以五毒攻之所謂腫者壅腫也潰者膿血溢也金者刃傷也折者傷損也祝讀如注以藥傅著之也劀刮去膿血也殺去其惡肉也齊與劑同五毒五藥之有毒者石膽一丹砂二雄黃三礜石四磁石五用黃堥置五石其中燒之三日夜其煙上著以雞羽掃取之以注瘡惡肉破骨盡出黃堥黃瓦器也此當後世醫方之祖又曰瘍醫公孫知叔記問該博深明百藥之性創造五毒之劑取丹砂養血而益心雄黃長肉而補脾礜石理脂膏而助肺磁石通骨液而壯腎石膽治筋而滋肝療瘡瘍之五證內應五臟拘之以黃堥熟之以火候藥成傅瘍無不神效一人須有疽一夕決潰勢欲殆以前藥傅之應手而差是乃生生乳之祖産婦側臥本邦産婦禁側臥特子玄子著産論令乳婦去産帶安臥余嘗遊其門親炙之其臥者神心安靜得快睡防暈除熱之良策也其驗大勝於藥餌而人皆憚之頃讀一方書曰高山血搦治産後並金瘡立效湯豐臣秀次公方並云服湯後發汗則解去帶側臥則妙與産論說暗合也人勢李東璧曰人陰莖非藥物也輟耕録載杭州沈生犯奸事露引刀自割其勢流血經月不合或令尋所割勢酒服不數日而愈按高山血搦方內用人勢立效湯秀次公方並同而人勢作睪丸本邦古昔入藥治金瘡者與輟耕録相符高山血搦上杉某方療産後血暈並金瘡人參沉香各一錢甘草五分蔥白十莖長二寸燒味噌龍眼肉大蕉外腎割作兩片刮去中道黃物洗淨陰乾五分上㕮咀以水二盞煎取一盞二分分之二服其一乘熱飲之其一帶溫飲之不留渣滓都要飲盡少頃渾身覺溫溫頂上出汗須去中帶穩臥如平常任其睡勿呼起若不解帶而臥者為後患立效湯吉松流方按松疑益字之誤治金瘡産後並角弓反張者人參沉香各三分五釐甘草五釐其人面白者炒赤者生用蔥白長一寸許三莖加至七莖銼乾用者亦佳燒味噌栗子大去外邊焦黑者干收睪丸三分五釐臘月取之割為片插竹北陰之地曝乾漬好酒一宿銼干若無睪丸代胞帶或加至五分上水二盞煎取一盞半熱飲當背脊汗出候其額上漐漐然再飲令去帶側臥則佳有熱者倍加睪丸無熱者減半血氣上衝者加童便三蛤貝殼許以四五歲兒便為良無汗身冰冷者加蔥七莖汗多者一莖凡服藥後若吐者凶産後中風或角弓反張或惡露不下或發瘧並主之禁如法且忌乾柿豐臣秀次公方治産後血暈兼金瘡人參大沉香中睪丸甘草各少許蔥白二寸許七莖燒味噌龍眼肉大上㕮咀加麝香少許用水一盞半煎至半盞熱服候其鼻尖發汗解帶側臥勿掉搖血暈不省人事者最宜服之其證不具者勿用蠱晉侯求醫於秦秦伯使醫和視之曰疾不可為是謂近女室疾如蠱非鬼非食惑以喪志又曰生內熱惑蠱之疾後世所謂陰虛火動之症也趙孟曰何謂蠱對曰淫溺惑亂之所生也於文皿蟲為蠱谷之飛亦為蠱在周易女惑男風落山謂之蠱杜預曰蠱惑疾按惑蠱蓋古所稱之病名於今復不用張仲景所謂百合狐惑病狐蠱音或通崔氏方曰易有蠱卦又子産所說並以器皿中蟲為蠱今省凡皿上安一蟲字或作蟲邊大非體也隋書志江南諸郡往往畜蠱而宜春偏甚其法以五月五日聚百種蟲大者至蛇小者至蝨合量器中令自相啖餘一種存者留之蛇則曰蛇蠱蝨則曰蝨蠱行以殺人因食入人腹內食其五臟死則其産移入蠱主之家三年不殺它人則畜者自鍾其弊纍世子孫相傳不絶亦有隨女子嫁者余按為子産之言者誤也晏子春秋曰無良左右淫蠱寡人後漢梁冀妻壽善為妖態以蠱惑冀是亦同義而不必病名戾太子巫蠱之事亦非此義而醫家所說有水蠱飛蠱蠱脹腸蠱蠱注痢等之稱醫書謂蠱有數種而人養作者最多也中毒者吐下惡血而死腸蠱蠱注痢者以其似器中蠱之狀為名也水蠱與蠱脹並非中毒淫惑之症靈樞曰男子如蠱女子如怚香川太衝解蠱字曰鼓蠱音通是也春臺漫筆曰狗蠱蓋本巫蠱之義病源候論曰貓鬼者云是老貍野物之類變為鬼蜮而依附於人人畜事之猶事蠱以毒害人其病狀心腹刺痛食人腑臟吐血痢血而死有野道者是無主之蠱也人有畜事蠱以毒害人為惡既積乃至死其蠱則無所依止浮游田野道路之間有犯害人者其病發猶蠱狀按稱飛蠱者是也飛蠱肘後方云去來無由漸狀如鬼氣字彙曰米久積變為飛蠱增韻謂蛾沈存中夢溪筆談曰豫在中書檢正時閲雷州奏牘有人為鄉民詛死問其狀鄉民能以熟食咒之俄頃膾炙之類悉復為完肉又咒之則熟肉復為生肉又咒之則生肉能動復使之能活牛者復為牛羊者復為羊但小耳更咒之則漸大既而復咒之則還為熟食人有食其肉覺腹中淫淫而動必以金帛求解金帛不至則腹裂而死所食牛羊自裂中出獄具案上觀其咒語但曰東方王母桃西方王母桃兩句而已其他但道其所欲更無他術許宏湖海奇方云經驗方治桃生桃仁齊直指方作挑毒忽肋下腫起如癰疽狀頃刻大如杯碗乃中桃生毒也俟五更以緑豆細嚼試若香甜則是也急以川升麻為末取冷熱水調二錢連服之若洞泄出如蔥根者腫即消也卻以平胃散調補之郎瑛七修類稿曰雲貴廣西有云桃生者妖術也以魚肉請人遂作術於中人食之則此物遂活於胸腹害人至死而後已也嘗見範石湖桂海虞衡志載當時李壽翁為雷州推官得一方甚妙云食在胸膈則服升麻吐之在腹則服鬱金下之想即今之下蠱云耳虞衡志頗無而士官病之也揭出之又陳明善洗冤録載金蠶蠱藥思蠱事小異洗冤録曰金蠶一名食錦蟲蟲屈如指環食故緋帛錦如蠶之食葉滇蜀湖廣閩粵皆有奸人畜之取其糞置飲食中毒人人即死蠶得所欲則日置他財使人暴富然遺之極難水火兵刃都不能害必倍其所致金銀錦物置蠶於中投之路旁人偶收之本隨以往謂之嫁金蠶不然人人腹殘齧腸胃完而後出也粵西有藥思蠱狀似灶雞蟲如蠶豆大能變幻作小孩形遣嫁之法倣佛金蠶春臺所言狗蠱者乃錢希言獪園所謂常州人好殺犬以祭淫神而犬名韓盧狗大王即犬妖所作矣即是醫藥正傳載殺白犬治驗一條亦犬妖所作而事與是不同醫學正傳曰一婦人年二十七美貌得一證如醉如癡頰赤面青略有潮熱飲食不美其脈乍疏乍數而虛每夜見白衣少年與睡一醫與八物湯服數十貼不效召豫治之見其家有白犬臥枕戶閾豫曰必此犬為怪命殺犬取其心血及膽汁丸安神定志之藥以八物吞下服藥十數貼丸藥一料以安其丸藥用遠志石菖蒲川歸黃連茯神硃砂側柏葉草龍膽等藥也貓鬼野道貓鬼野道余久疑之巢元方曰老貍野物之類變為鬼蜮而依附於人人畜事之獨孤陀婢呼曰貓女可來隋書獨孤陀傳曰徐阿尼事貓鬼每以子夜祀之言子者鼠也陀嘗從家中索酒其妻曰無錢可酤陀因謂阿尼曰可令貓鬼向越公家使我足錢也阿尼便咒之居數日貓鬼向素家十一年上初從並州還陀謂阿尼曰可令貓鬼向皇后所使多賜吾物阿尼復咒之遂入宮中大理亟楊遠乃於門下外省遣阿尼呼貓鬼阿尼於是夜中置香粥一盆以匙扣而呼之曰貓女可來無往宮中久之阿尼色正青若被牽曳者云貓鬼已至由是其事具得實是貓精以淫祀所畜之物而非他物之變也所以言貓鬼也野道巢氏以為無主蠱於原野上所得也隋高祖開皇十八年延州刺史獨孤陀有婢曰徐阿尼事貓鬼能使之殺人云每殺人則死家財物潛移於畜貓鬼家會獨孤後及楊素妻鄭氏俱有疾醫皆曰貓鬼疾也上以陀後之異母弟陀妻楊素異母妹由是意陀所為令高熲等雜治之具得其實上怒令以犢車載陀夫妻將賜死獨孤後三日不食為之請命曰陀若蠹政害民者妾不敢言今坐為妾身敢請其命陀弟司勳侍郎整指闕求哀於是免陀死除名為民以其妻楊氏為尼先是有人訟其母為貓鬼所殺者上以為妖妄怒而遣之至是詔誅被訟行貓鬼家夏四月辛亥詔畜貓鬼蠱毒厭媚野道之家並投於四裔蓋野道言左道妖術之事非其道故曰野也果為無主蠱則令何物奉此詔乎水腫平安山脅東門先生寄書曰得浪華林一烏治水腫方曰地膚子大大麥小豆各中上三味各別炒合和調勻更炒之是一烏之奴竊識而傳之也余不知林一烏為何人後讀望鹿門又玄余草有林一烏傳曰羽林山名氏持節戍鎮攝城臨往令烏以醫藥從焉到時城內逢於疫腫更興焉一般流行暴死者甚多烏為設一法又立一方斷禁米粟偏食菽麥以令疏泄敦阜乃試施之屢有收功後好事者或名為腳氣腫滿云然烏者惟稱腫不用別名烏來東都寓居於金龍山畔其治驗藥餌自積為書名客中集其書半刻在世半藏在家未全備乃活套也其立方禁祕枕中不欲傳非人故其書不載或欲將三百金換其方者不敢肯然今其不傳後世恐屬烏有可惜哉東門先生之所傳蓋此方也或傳三輪神庫藏水腫方茯苓豬苓澤瀉大麥赤小豆地膚子各等分牽牛子半分郁者加木香上逆加檳榔後林一烏加縮砂香附子各一分半七日內餌麥與赤豆林氏據三輪方者也浪華有澀川者余聞其善治水腫因叩其方曰禁穀食令食赤小豆一味以砂糖或醬鹽隨其好和調之一二日厭食赤豆者單麥間之雖菜果不許食之如此二三日而得快利其間服赤小豆豬苓澤瀉木通縮砂各五錢香附子一錢上水煎亦據林氏之法者也菌毒香祖筆記曰天平山僧得菌一叢煮食之大吐內三人取鴛鴦草啖之遂傳二人不啖竟死鴛鴦草藤蔓而生黃白花對開治癰疽腫毒尤妙或服或傅皆可也蓋沈存中良方所載金銀花也余未試俟後日菌有毒人皆識之都會之人所食者香黃菌之屬皆無毒山林幽闢之人或食無名諸菌中毒者多致殞余幼時在江戶駒籠邸先鋒隊卒三人入永樂園見橋柱栗村生菌把之烹食明日一人出學射持滿而發箭飛二三尺而墮自云咄咄怪事又發落膝前傍人皆笑俄然昏倒人皆以為風痱舁而送舍則前二人既病臥在床上一人其中毒稍輕者自云昨所食之菌毒焉諸醫亂投備急犀角等諸藥無寸效一身黑紫經二三日而死一人稍輕者得活周密癸辛雜識曰嘉定乙亥歲楊和王墳上感慈庵僧德明遊山得奇菌歸作糜供衆毒發僧行死者十餘人德明亟嘗糞獲免有日本僧定心者寧死不汙至膚理坼裂而死至今楊氏庵中尚藏日本度牒其年有久安保安治承原作象誤等號僧銜有法勢大和尚威儀從儀少屬少録等稱是歲其國度僧萬人定心姓平日本國京東相州行香縣上守鄉光勝寺僧也人中黃解諸毒人皆識之而不用之先鋒卒者偶然之失可惜余幼不及此事每想愴然黃龍湯肘後方曰絞糞汁飲數合至一二升謂之黃龍湯小柴胡湯又名黃龍湯見於千金方是解毒良品運用多端不可不知也不啻消菌毒內飲外塗其效甚多以常有之物或嫌其穢汙人多不用寄園寄所寄曰風狗毒蛇咬傷者以人糞塗傷處新糞尤佳諸藥不及此余當著瘈狗傷考一篇詳述之此不復贅焉齊書和士開威權日盛嘗有一人士參士開疾值醫云王傷寒極重應服黃龍湯士開有難色人士曰此物甚易服王不須疑請為王先嘗之一舉而盡士開感其意為之強服遂好愈黃胖源養德腳氣類方曰近世有浮苦病者方言也其症肢體黃腫胸腹為脹治之以水葒鐵粉之劑服者多愈蓋田夫野人多罹此疾或云黃胖也又有母多足者一名阪下皆方言也足脛為腫起居如常甚者難步履今時屢見兩足粗大與病偕老者即古所謂壅疾是也又高野山中冬月間童子十五六歲者多罹腳疾初其感之兩腳為攣行步艱痛坐臥則如忘他無所苦數與藥餌無效唯當春暖之時投腳田澤中屢蹈泥濘則愈或不愈者動輒為痼終身禹步云率遭此病者為瘦人肥人無之豫謂皆是腳氣之類也按此病此間未嘗見之是風土之異也青浮苦病又亞遠之病又阿於太牟即黃胖也醫學綱目證治準繩並曰食勞疳黃一名黃胖張氏醫通食勞黃疸俗曰黃胖香川太衝曰此名出於衛生方鑑行余醫言論之詳中人以下多染此病余按本藩地方栽培烟草之處尤多此病焉其證身體青黃浮腫起居動作喘息膈間動悸如鼓上衝人迎築築然而耳鳴其劇者或欲起行則先眩悸喘息平坐偶然則動穩喘平精神不甚惡但偃蹇懈怠其人手足爪甲枯碎不長皺反不澤是其兆也大學所謂心廣體胖朱子曰胖安舒也蓋病之者多眩悸喘息不能疾步急作常欲寬平安舒其名胖蓋取義於此也治方緑礬為君藥針砂亞之吾門有針砂湯皇盤丸數用數驗母多足與黃胖異別有說阪下之名蓋取義於其眩悸短氣不能登高頃得元祿年間所輯方書其中載治青腹病一名阪下者葛粉麵粉各百錢硫黃五錢鐵粉五十錢上各以好酒煉風乾堅硬再末篩日三服每一錢白湯送下服後大便必黑勿驚是其驗也若面色及手足尚不復者加水苦藚薄茶半服許是黃胖也沈慶暘萬病必愈曰五疸神丹緑礬不拘多少炒至白色為度若入瓶中火煅尤好細末煮棗肉為丸如櫻桃大每服五丸早晨午間晚上各一服冷酒送下忌醋生冷發物若蟲亦吐出神效古人都屬之黃疸者為未穩也今治之其證未甚著有兼痰喘久嗽等並病者又有傷風痔漏藏毒帶下去血過多後為斯症者宜識之治方皆同而方書所未論也永類鈐方曰腸風下血積年不止虛弱甚者一服取效緑礬四兩入砂鍋內新瓦蓋定鹽泥固濟煅赤取出入青鹽生硫黃各一兩研勻再入鍋中固濟煅赤取出去火毒研入熟附子末一兩粟米粥糊丸梧子大每空心米飲溫酒任下三十丸又魏氏家藏方載硫附鹽礬丸曰治經年久病下血虛弱甚者而其方大同小異是亦失血後為黃胖之症只謂虛弱甚者蓋見其面色青黃虛悸喘息而稱之也其方劑治黃胖之方而非治虛弱甚者之藥也古人之說有所未盡母多足母多足與黃胖異古曰腫曰瘇養德屬之腳氣者傳證治準繩之誤又言古所為壅疾者為不穩千金方曰夫腳氣者擁疾也消渴者宣疾也春夏陽氣上故擁疾發即宣疾愈也秋冬陽氣下故宣疾發即擁疾愈也審此二者疾可理也香川太衝曰有一種俗呼腯腳者其證初發不覺何因而然或一腳或兩腳脛腫大不痛不癢行步不妨雖不治療終身無害間有腿腫者此亦瘀血惡汁之凝結腳部者而與陰㿗同類王肯堂與腳氣同看非也可謂活眼矣余嘗視之但腳脛腫大行步槃散又有陰囊腫脹殆及地者其因屬㿗疝者明矣小雅云既微且腫注曰骭瘍為微腫與瘇同賈誼曰天下之勢方病大瘇一脛之大幾如腰一指之大幾如股平居不可屈伸如淳曰腫足曰瘇是乃母多足也有林福田方特載足腫腫原作元重誤刺灸之法余未試福田方曰以甘刀足第四第五指間赤脈處並踝下骨解泄其惡血血至一斗五升而無害若見余處有赤脈者破之𡃤惡血傅大黃膏勿令得風水又云刺內踝上大脈血出即差又云灸外踝夫上又云檢之有赤脈血路灸其侄兩三處各二十一壯尤佳注曰侄元栗切一寸也𡃤當作嗽祭神農潛居録曰八月朔古人以此日為天醫節祭黃帝岐柏本邦醫家以正月八日祭神農蓋原於藥師如來結緣日慈覺大師修經時一佛一神日來護之藥師尊江文大明神以八日現依為結緣日可笑之甚也大已貴命少彥名命為本邦醫藥之鼻祖而醫家不祀二神者蓋由無遺訓及今日者惜哉其方法之亡世傳大同類聚方抄本安部真貞奉敕所撰云近浪華木孔恭鐫行內有稱神方者古云盡信書不如無書余於此篇亦云痘神倉山隨園詩話曰痘神之說不見經傳蘇州名醫薛生白曰西漢以前無童子出痘之說自馬伏波徵交址軍人帶此病歸號曰虜瘡不名痘也語見醫統余考史書凡載人形體者妍媸各備無載人面面原作而刮誤麻者惟文苑英華載熲川陳黯年十三神詩見清源牧其其疑某曰篇詠河陽花時痘痂新落牧戲曰汝藻才而花面何不詠之陳應聲曰玳瑁應難比斑犀點更嘉天憐未端正滿面與妝花似此為痘痂見歌詠之始樂宮譜耳食録曰痘神何神也姑勿深考或曰居峨眉山姐妹三人身著麻衣蓋女仙之流主人問痘疹之疾人呼為麻娘娘云神甚靈顯而嚴於小節病痘之家為位奉之言語稍不檢衣物稍不潔及誠敬少懈者病者輒作神言語阿譴之雖私隱無不揭其甚者痘或不治為得罪於神也靈異之跡不可勝紀然亦非妄禍人者吾鄉陳君洪書兒時以痘死置於東廂其母撫而哭之坐於戶限倦而假寐見三麻衣婦人入室視兒驚曰向幾誤此望都宰也可放還言畢出戶去母驚覺兒已蘇矣後果仕望都縣令罷官歸今猶在由是觀之痘殤者非盡神之為政也其亦數之前定者歟望鹿門醫官玄稿痘疹十奇說有祭痘神及酒湯之事醫官玄稿曰吾俗間祭祀痘神神實如在焉凡至十二朝期畢乃令浴痘兒謂之酒湯因其湯中灌酒也若後期則災害並至而此法獨不在於彼以其方書無明據世之醫有難之者然自古有所試驗而然俗習不得止也又櫻陰腐談言酒湯出於全幼心鑑者誤也全幼心鑑曰十二日十三日瘡痂已落其瘡瘢或凸或凹肌肉尚嫩不可澡浴酒湯之事未知創於何時余家兄弟兒女皆系痘患未嘗用祭祀及酒湯之事甥侄又慣之終無一異云本邦患痘家必祭疱瘡神夫妻二位於堂俗謂之裳神巫曰無神名臨時迎祭所在近祠之靈神如其然則當供一神而可何祭其配乎或曰痘疹守護神者出雲國大社之末社鷺森明神文德仁壽三年依神命祭之鷺森明神祭天月神命舊事本紀云天月神命一岐縣主等祖頭書曰紀如尚云天月神命是亦非月讀命高皇産靈裔神也顯宗紀云月神著人曰我祖高皇産靈有熔造天地之功奉以歌荒㺐田一岐縣主侍祠神名帳曰一岐郡月讀神社高御祖神社又曰山城國葛野坐月讀神社所謂月神月讀神社共是天月神命也乎而祭夫妻二神者終不可解獪園曰吳俗抱痘之家必供五郎神於堂既兆吉具牲牢獻之者此名花花五聖又曰乃知惡鬼即是痘司鬼神來攝小兒或云是死於痘者來求受替也痘瘡痘瘡諸說皆云起於後漢時而原於馬伏波徵南陽行卒患虜瘡之事而後漢書不記此事當以出於肘後方為證肘後之書雖經後人之手猶為古書肘後方曰比歲有病時行仍發瘡頭面及身須臾周匝狀如火瘡皆戴白漿隨決隨生不即治劇者多死治得差後瘡瘢紫黑彌歲方滅此惡毒之氣也人云永徽四年此瘡從西東流遍海中煮葵菜以蒜虀啖之即止初患急食之少飯下菜亦得以建武中於南陽擊虜所得仍呼為虜瘡諸醫參詳作治用之有效方取好蜜通身上摩亦可以蜜煎升麻數食之余按後世升麻葛根湯之所祖也本邦痘瘡始天平七年乙亥時醫不識其救法公卿多斃於此病醒醐帝始有患痘之事文德寶録曰仁壽三年二月京師及畿外多患皰瘡死者甚衆天平九年及弘仁五年有此瘡患今年復不免此瘡而已羅浮子曰痘瘡之病考諸醫家之說隋巢元方雖說傷寒斑瘡豌豆瘡皰無方藥唐孫真人書豌豆瘡在傷寒部中而有治方宋陳言曰斑瘡病內經與仲景皆不載蓋魏朝方有焉以白頭赤根者俗為豌豆即斑瘡也細粟如麻者俗呼為麻即虜瘡也又有大者為芋為萍此皆輕重之不齊故命名異耳而亦有治方孫陳所言乃似不拘壯幼蓋真人者唐高宗時人而在天平之前然則豌豆瘡自漢土傳我西州而至京師古昔無之而此時初發乎藤原公忠後愚昧記載應安七年後光嚴帝患痘瘡施藥院使丹波篤直以柚針刺之病終不治自天平至應安六百四十餘年何不熟其方法乎然痘瘡實起後漢歷三國六朝至唐無明辨之者則又何獨責篤直乎紅毛治痘灌膿時刺去膿蓋防內攻之策云五雜俎曰韃靼種生無痘疹以不食鹽醋故也近聞其與中國互市間亦學中國飲食遂時一有之彼人即舁置深谷中任其生死絶跡不敢省視矣一云不食豬肉故爾西域聞見録曰小兒亦出痘輕而易過百中或損一亦從無回子麻面者倘出痘者多則避於深山極寒之地可免克按其症之發不在食餌五島八丈島亦無此病蓋其風土為然西肥鮮此患人士未染者不能遠離其地含使命四方或於役江戶裹足境內與彼禁錮一般故聞長崎及諸方痘瘡流行則或往其地祈其傳染或行種痘法而歸翁加里亞國亦無痘行商濟異域者先行種痘法而後航海明和年間遷八丈民於下野芳賀郡居頃之而老壯患痘寬政八年丙辰五月三日常陸那珂湊一船漂著所乘十一人問之曰伊豆三宅島舟也去年七月草二日載流徒送八丈島十月至島今年四月發島遇西風至於此當日檢之告官令吏賜糧食內有八丈島民三人曰八丈島自古無痘瘡方今一般流行斃於此病者日多一日小民無智以保一日之命為幸奔走竄伏隱山入谷避之猶避敵耕耨漁樵一時廢業恐令公田赤地村甲伍老入山教諭以痘災未除惟死之懼所保結官絹染絲既成織女竄山或臥枕無紡績者恐致稽遲因報知之具狀以聞本島之例不經八十八夜則不能渡海蓋避風濤之災也豫輩不及待之故托三宅島舟解纜果遇駭風漂流於此因問其詳曰寬政乙卯九月草七日八丈島船自伊豆歸所乘三根村民於船中得病十月三日周身發紅不知何病醫議曰痘瘡也本島從來無此病今有此症恐傳染外人乃區畫裡外構小舍置之終以不起延及其家人鄰側先是天明年間島內樫立村痘疹流行死者甚多以故人心益不安三根村外十里斷路禁往來使樫立村往年患痘者役使之島吏趣三根村看護之死者不止小民棄家攜妻子遁逃山中無幾支村稻葉里發痘島吏令病者悉送之本村防之日後患者比比相屬不能又送之其死者多系老壯如幼少者其病輕三根村男女千四百餘口竄山者二百餘人惟患者千二百人死者四百六十人末吉樫立二村與三根村隔山故禁村民不得相交客歲晚冬樫立村有一人罹患者速遷之裡外往年死於痘者三百餘人今年病者皆是幼童以故死者少樫立村男女九百餘口患者百三人死者二十九人末吉村去年臘月一人得痘並其未發痘之時至其家者遷之居里外不得與村人相交會人人欲棄家避山中盤驗之無糧可支數日者仍教諭就農桑漁樵至今年正月比屋患之末吉村男女八百餘口皆逃去山中患者五十五人死者十五人大賀鄉預防之禁村民與他村往來客歲季冬有一人發痘者速遷之三根村鄉中驚怖竄入山中其得免痘死亦不得免餓死里正等招諭就産業無一人歸者逃山中者得痘又令遷之三根村無幾患者相次不暇悉遷之男女千八百餘口患者百二十六人死者四十七人中之鄉不與痘村相通嚴防之至今年早春一人發痘送之裡外處草舍教諭鄉中勸産業又一人得痘鄉人謂不入山則不能免與死於痘寧死於餓一時騷亂竄入山中不日山中發痘者多矣仍有稍稍歸家者男女千餘口患者四十人死者十三人小島令禁渡海故無痘疢小島民來寓三根村者二人罹災死青島往年地中出火焰燒後八丈人遷居墾田島人預防痘災然亦終不能免男女百五十餘口患者十九人死者十三人素問評靈蘭祕典論曰心者君主之官也神明出焉肺者相傅之官治節出焉肝者將軍之官謀慮出焉膽者中正之官決斷出焉徂來先生素問評曰此篇晉代之文何則漢魏晉丞相多兼太傅將軍春秋以後之官中正乃魏晉之官按周成王作周官曰立太師太傅太保茲惟三公論道經邦燮理陰陽少師少傅少保曰三孤二公弘化寅亮天地弼豫一人則三太周之三公也故不以一職為官名又以三少為孤卿與六卿為九焉傅已創於周將軍未聞周以前有之三代之制天子六軍其將皆命卿故夏書曰大戰於甘乃召六卿蓋古之天子寄軍政於六卿居則以田警則以戰所謂入使理之出使長之之義諸侯之制大國三軍次國二軍小國一軍其將亦命卿也晉獻公初作二軍公將上軍則將軍之名起於此也魏獻子衛文子並居將軍之號左傳晉閻沒女寬謂魏獻子曰豈將軍食之而有不足又禮記將軍文子之喪既除而後越人來吊又家語曰衛將軍文子問子貢是也又老子三十一章曰偏將軍居左上將軍居右中正按古五行之官春官木正曰句芒夏官火正曰視融秋官金正曰蓐收冬官水正曰元冥中官土正曰后土後人中正之名蓋起於此史記陳勝既為楚王以朱房為中正一具方書云魚獸鳥心肝稱量者呼一具全具不傷敗者一個之謂也王漁洋池北偶談曰王景略臨終托其子皮十具牛為治田之資不為求官亦葛侯八百本桑之意今江淮以北謂牛四頭為一具俗語有所本此說與方書所謂一具固自不同吹奶方書言吹奶即乳癰也儒門事親云乳癰俗呼曰吹乳是也又病人答曰吹你寇宗奭曰地黃葉如甘露子花如脂麻花北人謂牛奶花又李時珍曰俗呼其苗婆婆奶又遵生八箋有牛奶柑此他俗語稱婦人曰奶奶之類不暇每舉而字書不載奶字貝原好古和字雅曰乳你奶腉並同字彙曰你音乃乳也蓋自你音乃生一奶字來者而字書不收者遺脫也竇漢卿瘡瘍經驗全書論吹字曰外吹乳者小兒吮乳吹風在內故也內吹乳者女人腹中有孕其胎兒轉動吹風在外故也煎藥中須用保胎之劑以治乳發之藥同治之而言其胎兒轉動吹風者為迂遠畏疫論語曰鄉人儺朝服而立於阼階孔安國曰儺驅逐疫鬼郊特牲曰鄉人裼孔子朝服立於阼在室神也鄭玄曰裼強鬼也謂時儺索室毆疫逐強鬼也裼或為獻或為難音曰裼音傷難或作儺周時既有畏疫之事屠蘇辛盤之屬皆興於畏疫者於門戶上插種種之物西土俗亦同除日插鰯魚頭尾於門戶名曰疫案山子松下見林國朝佳節録曰今按插魚頭者旁礫之義紀貫之土佐日記載門戶插鯔頭枸葉蓋昔不必用鰯魚陳善捫蝨新話曰豫聞關中人不識蟛蟹人有得一干蟛蟹者或病則掛之門其病遂愈沈存中曰不但人不識鬼亦不識也本邦之鬼亦不識鰯魚也夢溪筆談曰關中無螃蟹元豐中豫在陝西聞秦州人家收得一干蟹土人怖其形狀以為怪物每人家有病瘧者則借去掛門戶上往往遂差不但人不識鬼亦不識也假作正月凡世俗遇疫邪災疾凶荒之歲則不問何月何日假作正月模樣以為除舊迎新凶災可轉相呼曰流行正月香祖筆記曰老學庵筆記陳師錫家亨儀以冬至前一日為冬住又云唐盧頊傳云是日冬至除夜乃知唐人冬至前一日亦謂之除夜吾鄉三十年前冬至節祀先賀歲與除夕元旦同近乃不行亦不知其所以然也乙酉夏二東多疫忽有鄉人持齊素者言以五月晦為除夕禳之則疫可除一時村民皆買香燭祀神祇祖先亦妖言也乃知西土亦有流行正月知雨霽病者知風雨晦晴者皆是血分之不爽也或屬虛乏或屬瘀滯打撲折傷癥瘕疝癖皆知之只蟲積之一症乃系別因其治在於此不在於彼關羽嘗為流失所中貫其左臂後創雖愈每至陰雨骨常疼痛醫曰矢鏃有毒入於骨當破臂作創刮骨去毒然後此患乃除耳羽更伸臂令醫劈之時羽適請諸將飲食相對臂血流離盈於盤器而羽割炙引酒言笑自若唐司空邠王守禮庸鄙無才識每天將雨及霽守禮先言之已而皆驗岐薜諸王言於上玄宗曰邠兄有術上問其故對曰臣無術則天時以章懷之故幽閉宮中十餘年歲賜敕杖者數四背瘢甚厚將雨則沉悶將霽則輕爽臣以此知之耳因流涕沾襟上亦為之慘然守禮章懷太子之子也鴟梟鵂西土人忌鴟鵂梟屬本草載鴟鵂夜飛晝伏入城城空入室室空若聞其聲如笑者宜速去之又曰梟即梟也一名鵩入室主人當去賈誼鵩鳥賦即惡其不祥也鴟鵂與鵩甚相似各有其類共忌入於人家日木紀仁德紀曰天皇生日木兔入於産殿譽田天皇召大臣武內宿禰語之曰是何瑞也大臣對言吉祥也昨日臣妻産時鷦鷯入於産屋是亦異焉天皇曰今朕之子與大臣之子同日共産兼有瑞是天之表也取其鳥名各相易名子為後葉之契也是木兔宿禰也木兔乃鴟鵂也本邦原不忌此物頃讀徐氏筆精徐著曰梟惡鳥也人聞其鳴輒為不祥昔梟鳴牙旗謝艾乃兆軍勝梟鳴庭樹張率更乃先授官唐章顓將放榜日梟鳴檐際逐之復還顓曰我失意無所恨兼恐橫罹災患須臾榜出顓登第然則梟非惡鳥也一士人語余曰頃夜間聞少婦巧笑始以為鄰人細聞之則其聲在庭外樹梢家婢侍兒輩驚畏無出氣者須臾又聞老丈高笑不知何怪最後作鴟鵂鳴兩三叫去始知其鴟鵂余曰本草有之聞其聲如笑宜速去之曰笑是非不祥之聲是何理余不知其對饑饉唐德宗貞元中關中倉廩竭禁軍或自脫巾呼道曰拘吾軍而不給糧吾罪人也上憂之甚會韓滉運米三萬斛至陝李泌即奏之上喜遽至東宮謂太子曰米已至陝吾父子得生矣時禁中不釀命於防市取酒為樂又遣中使諭神策六軍軍士皆呼萬歲時比歲饑饉兵民率皆瘦黑至是麥始熟時有醉人當時以為嘉瑞人乍飽食死者復五之一數月人膚色乃復故本藩郡縣所在設稗倉而畜積數十百歲人以為長物天明癸卯七月七日天雨砂土如重霧如篩灰相去咫尺不可相見日影如未磨鏡翳翳無光采白晝晦暗家家點燈不知何故人皆驚怪老人或言寶永中富士山旁吐沙起山此時如此後數日始傳信州淺間山燒是年盛夏多雨陰涼仍著冬衣甲辰民甚餓此冬無雨雪乙巳梅雨中無一陰田畝赤地稼禾不耕臘月時發雷聲人以為異丙午六月連雨七月十六日洪水漂沒民家平地水高丈餘關東大饉都人以為米商奸黠藏米之所致數十人相呼市頭喧譁擊破米肆蹂躪其所畜米苞狼藉市街甚至倒屋折柱街頭為不通二三晝夜橫行都中壞盡行米數百戶此時米三合價百錢於是本藩開倉廩賑給貧民牛馬絡繹而運之里正伍長相檢校而無所不及時貧人雜食芣苣冬青葉等之物面色青黃微腫仍索救之方乃私制三因方所載解毒丸告官博施給之郡司大得其驗而與唐書言瘦黑者不相符
